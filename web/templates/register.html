<!DOCTYPE html>

<html>

<head>

    <title>Create Account</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/register.css') }}"
    >

</head>

<body>

<div class="login-card">

    <h1>

        📝 Register

    </h1>

    <p>

        Create Secure Chat Account

    </p>

    <form
        method="POST"
    >

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button
            type="submit"
        >

            Register

        </button>

    </form>

    <a href="/">

        Back to Login

    </a>

</div>

</body>

</html>
